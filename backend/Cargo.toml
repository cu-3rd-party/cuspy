[package]
name = "cukiller-backend"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = { version = "0.8.9", features = ["tower-log"] }
clap = { version = "4.6.1", features = ["derive"] }
env_logger = "0.11.10"
serde = { version = "1.0.228", features = ["derive"] }
sqlx = { version = "0.8.6", features = ["postgres", "uuid", "time", "runtime-tokio-native-tls"] }
tokio = { version = "1.52.1", features = ["rt-multi-thread", "macros", "rt", "sync", "time"] }
tower = "0.5.3"
tower-http = { version = "0.6.8", features = ["trace"] }
uuid = { version = "1.23.1", features = ["serde"] }
