services:
  postgres:
    image: postgres:18beta2
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BIND_ADDRESS: 0.0.0.0:3000
      RUST_LOG: info
      ADMIN_SECRET: ${ADMIN_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      PUBLIC_WEBAPP_URL: ${PUBLIC_WEBAPP_URL}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 4173
      BACKEND_URL: ${BACKEND_URL}
      PUBLIC_WEBAPP_URL: ${PUBLIC_WEBAPP_URL}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "4173:4173"

  ngrok:
    image: ngrok/ngrok:latest
    env_file:
      - .env
    command: http frontend:4173 --authtoken ${NGROK_AUTHTOKEN}
    depends_on:
      frontend:
        condition: service_started
    ports:
      - "4040:4040"

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_dev_data:
