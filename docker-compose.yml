services:
  nginx:
    build:
      context: nginx
      dockerfile: Dockerfile
    depends_on:
      - backend
      - frontend
      - rustfs

  postgres:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cukiller -d cukiller"]
      interval: 5s
      timeout: 5s
      retries: 20

  rustfs:
    image: rustfs/rustfs:latest
    env_file:
      - .env
    volumes:
      - rustfs_data:/data

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  rustfs_data:
